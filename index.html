<html lang="es">
<head>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Sora:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1E63F5;
  --blue-600: #1855D4;
  --blue-50: #EAF1FE;
  --green: #22C55E;
  --green-dark: #16A34A;
  --green-50: #E6F8EE;
  --ink: #0B1220;
  --ink-700: #1F2A3D;
  --ink-500: #4A5670;
  --ink-300: #8995AE;
  --line: #E5E9F2;
  --line-2: #EEF1F7;
  --bg: #FFFFFF;
  --bg-soft: #F6F8FC;
  --bg-deep: #0B1220;
  --radius: 14px;
  --radius-lg: 22px;
  --shadow-sm: 0 1px 2px rgba(11,18,32,.04), 0 1px 1px rgba(11,18,32,.03);
  --shadow-md: 0 8px 24px -8px rgba(11,18,32,.12), 0 2px 6px rgba(11,18,32,.04);
  --shadow-lg: 0 30px 60px -20px rgba(11,18,32,.18), 0 10px 24px -10px rgba(11,18,32,.08);
  --maxw: 1240px;
}
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.55;
  overflow-x: hidden;
}
h1, h2, h3, h4 {
  font-family: 'Sora', system-ui, sans-serif;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin: 0;
  text-wrap: balance;
}
p { margin: 0; color: var(--ink-500); text-wrap: pretty; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }
.mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0; }
.container { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
@media (max-width: 640px) { .container { padding: 0 20px; } }
section { padding: 100px 0; position: relative; }
@media (max-width: 768px) { section { padding: 64px 0; } }
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--blue);
  padding: 6px 10px;
  background: var(--blue-50);
  border-radius: 100px;
}
.eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }
.eyebrow.green { color: var(--green-dark); background: var(--green-50); }
.eyebrow.green .dot { background: var(--green); }
.h1 { font-size: clamp(40px, 6vw, 76px); line-height: 1.02; }
.h2 { font-size: clamp(32px, 4.2vw, 52px); line-height: 1.06; }
.h3 { font-size: clamp(22px, 2.2vw, 28px); line-height: 1.2; }
.lede { font-size: clamp(17px, 1.4vw, 20px); color: var(--ink-500); line-height: 1.55; }
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  height: 52px; padding: 0 22px;
  border-radius: 100px;
  font-weight: 600; font-size: 15.5px;

}
.btn:active { transform: translateY(1px); }
.btn-primary {

}
.btn-primary:hover { background: #1a2640; }
.btn-blue {

}
.btn-blue:hover { background: var(--blue-600); }
.btn-ghost {

}
.btn-ghost:hover { background: var(--bg-soft); border-color: #D6DDEB; }
.btn-sm { height: 42px; padding: 0 16px; font-size: 14px; }
.header {

}
.header.scrolled { border-bottom-color: var(--line-2); }
.header-row {

}
.brand { display: flex; align-items: center; gap: 10px; }

.nav { display: flex; align-items: center; gap: 4px; }
.nav a {

}
.nav a:hover { background: var(--bg-soft); color: var(--ink); }

@media (max-width: 900px) { .nav { display: none; } }
.hero {

}
.hero::before {

}
.hero-grid {

}
@media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
.hero h1 .accent {

  -webkit-background-clip: text; background-clip: text; color: transparent;

}

}
.hero-sub { margin-top: 22px; max-width: 540px; }
.hero-cta { margin-top: 32px; display: flex; gap: 12px; flex-wrap: wrap; }
.hero-visual {

}

}
@keyframes pulse {

}
.hero-stat {

  max-width: 200px;
}
.hero-stat .lbl { font-size: 12.5px; color: var(--ink-700); font-weight: 600; line-height: 1.4; }
.problem-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  margin-top: 48px;
}
@media (max-width: 880px) { .problem-grid { grid-template-columns: 1fr; } }
.stat-card {
  padding: 32px;
  border-radius: var(--radius-lg);
  background: white;

}
.stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.stat-card .big {
  font-family: 'Sora', sans-serif; font-weight: 700;
  font-size: clamp(40px, 4vw, 56px); line-height: 1; color: var(--ink);
  letter-spacing: -0.03em;
}
.stat-card .big sup { font-size: 0.55em; vertical-align: top; font-weight: 600; }
.stat-card .lbl { margin-top: 16px; color: var(--ink-500); font-size: 15px; }
.stat-card .source {
  margin-top: 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--ink-300); text-transform: uppercase; letter-spacing: .08em;
}
.how { background: var(--bg-soft); }
.how-head {

}

}

.demo {

.demo-side {

  border-right: 1px solid rgba(255,255,255,.08);
}

}

.demo-stage {

}
.demo-stage .ground {
  position: absolute; left: 0; right: 0; bottom: 0; height: 22%;

  border-top: 1px solid rgba(255,255,255,.06);
}
.demo-stage .stripes {

  background: repeating-linear-gradient(90deg, rgba(255,255,255,.25) 0 24px, transparent 24px 48px);

.demo-stage svg.scene-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.benefits-grid {

}
@media (max-width: 640px) { .benefits-grid { grid-template-columns: 1fr; } }
.benefit {

.benefit:hover { transform: translateY(-3px); border-color: #D9E0EE; }

.specs-grid {

}
@media (max-width: 880px) { .specs-grid { grid-template-columns: 1fr; } }
.specs-visual {

  background: linear-gradient(180deg, #F2F6FF, #EAF1FE);
  border-radius: var(--radius-lg);
  border: 1px solid var(--line-2);

}
.specs-visual svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  padding: 8px 12px;

}
.specs-list {

}
.spec-row {

  display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px;

}
.spec-row .k {
  font-family: 'JetBrains Mono', monospace;

}
.spec-row .v { font-size: 16px; color: var(--ink); font-weight: 500; }
.spec-row .v small { display: block; font-weight: 400; color: var(--ink-500); font-size: 13px; margin-top: 4px; }
.audiences-grid {
  margin-top: 48px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
@media (max-width: 880px) { .audiences-grid { grid-template-columns: 1fr; } }
.audience {
  padding: 36px;
  border-radius: var(--radius-lg);
  background: white;
  border: 1px solid var(--line-2);
  display: flex; flex-direction: column; gap: 18px;
  min-height: 340px;
}
.audience.dark {
  background: var(--ink);
  color: white;
  border-color: transparent;
}

.audience .lbl {

}
.audience.dark .lbl { color: var(--green); }
.audience h3 { font-size: 26px; }

}
.audience.dark ul li { color: rgba(255,255,255,.78); }

  content: ""; width: 6px; height: 6px; border-radius: 50%;

}
.audience.dark ul li::before { background: var(--green); }
.audience .cta { margin-top: auto; }
.faq { background: var(--bg-soft); }
.faq-wrap { display: grid; grid-template-columns: 1fr 1.4fr; gap: 56px; align-items: flex-start; }
@media (max-width: 880px) { .faq-wrap { grid-template-columns: 1fr; gap: 32px; } }
.faq-list { display: flex; flex-direction: column; gap: 10px; }
.faq-item {
  background: white;
  border: 1px solid var(--line-2);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color .2s ease;
}
.faq-item.open { border-color: #D9E0EE; box-shadow: var(--shadow-sm); }

  width: 100%;

.faq-a-inner { padding: 0 22px 22px; color: var(--ink-500); font-size: 14.5px; line-height: 1.6; }
.cta-final { padding: 120px 0; position: relative; overflow: hidden; }
.cta-card {
  background: var(--ink);
  border-radius: 28px;
  padding: 64px;

  align-items: center;
  position: relative; overflow: hidden;
}
.cta-card::before {

.cta-card h2 { color: white; font-size: clamp(28px, 3.5vw, 44px); position: relative; z-index: 1; }
.cta-card p { color: rgba(255,255,255,.7); position: relative; z-index: 1; margin-top: 16px; }
.cta-card .form-wrap { position: relative; z-index: 1; }
.form-card {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.12);

  display: flex; flex-direction: column; gap: 14px;
}
.form-row { display: flex; flex-direction: column; gap: 6px; }
.form-row label {

  color: rgba(255,255,255,.5);
}
.form-row input, .form-row select, .form-row textarea {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 10px;

  color: white;
  font-family: inherit; font-size: 14.5px;
  outline: none;

.form-row select option { background: #1a2640; color: white; }

.form-submit {
  height: 50px;
  background: var(--green);
  color: #06200E;
  font-weight: 700;
  border-radius: 100px;
  font-size: 15px;
  margin-top: 6px;

}

.reveal { opacity: 0; transform: translateY(20px); transition: opacity .8s ease, transform .8s ease; }
.reveal.in { opacity: 1; transform: translateY(0); }

  /* ── Legal Modals ─────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(11,18,32,.7);
    backdrop-filter: blur(4px);

    padding: 20px;
    opacity: 0; pointer-events: none;

  .modal-box {
    background: white;
    border-radius: 20px;
    max-width: 720px; width: 100%;
    max-height: 80vh;

    transform: translateY(20px);
    transition: transform .25s ease;

// ── Scroll spy ─────────────────────────────────────────
function useScrollSpy(ids) {
  const [active, setActive] = React.useState('');
  React.useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY + 120;
      let cur = '';
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActive(cur);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [ids.join('|')]);
  return active;
}

function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('section');
    els.forEach(el => el.classList.add('reveal'));
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    els.forEach(el => io.observe(el));
    setTimeout(() => document.querySelectorAll('.hero').forEach(el => el.classList.add('in')), 50);
    return () => io.disconnect();
  }, []);
}

// ── Plug & Play Demo ───────────────────────────────────
function PlugPlayDemo() {
  const [step, setStep] = React.useState(0);
  const [playing, setPlaying] = React.useState(false);
  const timer = React.useRef(null);
  React.useEffect(() => {
    if (!playing) return;
    timer.current = setTimeout(() => {
      setStep(s => {
        if (s >= 2) { setPlaying(false); return s; }
        return s + 1;
      });
    }, 1800);
    return () => clearTimeout(timer.current);
  }, [step, playing]);
  const labels = [
    { t: 'Farola existente', d: 'La luminaria estándar lleva décadas en su sitio. Solo se enciende de noche; la acometida está infrautilizada el resto del día.' },
    { t: 'PlugPost instalada', d: 'Reemplazo Plug & Play: misma base, mismo cable. Ahora con cargador embebido en la columna y luminaria LED moderna.' },

function LegalModal({ id, onClose }) {
  const content = LEGAL_CONTENT[id];
  const overlayRef = React.useRef(null);
  React.useEffect(() => {
    if (!id) return;
    requestAnimationFrame(() => {
      if (overlayRef.current) overlayRef.current.classList.add('visible');
    });
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, [id]);
  const handleClose = () => {
    if (overlayRef.current) {
      overlayRef.current.classList.remove('visible');
      setTimeout(onClose, 260);
    }
  };
  const handleOverlay = (e) => { if (e.target === overlayRef.current) handleClose(); };
  if (!id || !content) return null;
  return (
    <div className="modal-overlay" ref={overlayRef} onClick={handleOverlay}>
      <div className="modal-box" role="dialog" aria-modal="true" aria-label={content.title}>
        <div className="modal-header">
          <div>
            <div className="mono-lbl" style={{ marginBottom: 4 }}>{content.lbl}</div>
            <h3>{content.title}</h3>
          </div>
          <button className="modal-close" onClick={handleClose} aria-label="Cerrar">✕</button>
        </div>
        <div className="modal-body">
          {content.sections.map((s, i) => (
            <div key={i}>
              <h4>{s.h}</h4>
              {s.body && <p>{s.body}</p>}
              {s.list && <ul>{s.list.map((li, j) => <li key={j}>{li}</li>)}</ul>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────
function App() {
  const active = useScrollSpy(['producto','como','beneficios','especificaciones','faq']);
  const [legalModal, setLegalModal] = React.useState(null);
  useReveal();
  return (
    <>
      <Header activeSection={active}/>
      <div id="producto">
        <Hero/>
      </div>
      <Problem/>
      <HowItWorks/>
      <Benefits/>
      <Specs/>
      <Audiences/>
      <FAQ/>
      <CTAFinal/>
      <Footer onLegal={setLegalModal}/>
      <LegalModal id={legalModal} onClose={() => setLegalModal(null)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
